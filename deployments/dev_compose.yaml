---
# Development overlay for docker-compose.yaml.
# Usage: docker compose -f docker-compose.yaml -f dev_compose.yaml up
services:
  web:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.dev
    volumes: [..:/usr/src/app, /usr/src/app/node_modules, ../data/uploads:/usr/src/app/data/uploads]
  pgAdmin:
    image: dpage/pgadmin4:9.11.0
    env_file: [.env]
    environment:
      PGADMIN_DISABLE_POSTFIX: true
    ports: [5433:80]
    volumes: [pgadmin_data:/var/lib/pgadmin]
volumes:
  pgadmin_data:
