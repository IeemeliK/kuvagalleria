{{ define "header" }}
  <header class="navbar bg-base-100 shadow-sm">
    <div class="flex-1">
      <a class="btn btn-ghost text-xl">Kuvagalleria</a>
    </div>
    {{ if .HeaderData.LoggedIn }}
      <div>
        <span class="text-sm">{{ .HeaderData.Username }}</span>
        <button class="btn btn-soft btn-error mx-2.5" hx-post="/logout">
          Kirjaudu ulos
        </button>
      </div>
    {{- end -}}
  </header>
{{ end }}
