---
services:
  db:
    image: postgres:18
    restart: unless-stopped
    # set shared memory limit when using docker compose
    shm_size: 128mb
    volumes: ['${HOME}/docker/kuvagalleria/postgres_data:/var/lib/postgresql']
    ports: [5432:5432]
    env_file: [.env]
  pgAdmin:
    image: dpage/pgadmin4:9.11.0
    volumes: ['${HOME}/docker/kuvagalleria/pgadmin_data:/var/lib/pgadmin']
    ports: [5433:80]
    env_file: .env
  web:
    depends_on: [db]
    env_file: [.env]
    build: .
    ports: [8080:8080]
