---
services:
  db:
    image: postgres
    restart: always
    # set shared memory limit when using docker compose
    shm_size: 128mb
    environment:
      POSTGRES_PASSWORD: example
    ports: [5432:5432]
  web:
    depends_on: [db]
    build: .
    ports: [8080:8080]
secrets:
  db_password:
    file: db_password
